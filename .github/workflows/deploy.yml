# While IRCC immigrant Tracker upstream is down, deploy the maintenance Worker only.
# To restore the full app later:
#   1. Confirm api.ircc-tracker-suivi.apps.cic.gc.ca resolves again
#   2. Change the Deploy Worker step back to: npx wrangler deploy --config wrangler.toml
#   3. Restore build:cf / npm test steps if desired
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy maintenance page
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Cloudflare secrets shape
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          account="${CLOUDFLARE_ACCOUNT_ID:-}"
          token="${CLOUDFLARE_API_TOKEN:-}"
          if [ -z "$account" ] || [ -z "$token" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN secret."
            exit 1
          fi
          if ! [[ "$account" =~ ^[0-9a-fA-F]{32}$ ]]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID looks invalid (len=${#account})."
            exit 1
          fi
          if [[ "$token" =~ ^[0-9a-fA-F]{32}$ ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN looks like an Account ID. Secrets may be swapped."
            exit 1
          fi
          echo "Secrets look well-formed."

      - name: Deploy maintenance Worker
        run: npx wrangler deploy --config wrangler.maintenance.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
