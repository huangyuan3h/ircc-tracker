# Deploy IRCC Tracker (OpenNext → Cloudflare Workers) on every push to main.
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN   — API token with Workers Scripts:Edit (and Routes if needed)
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account id
#
# Settings → Secrets and variables → Actions → New repository secret
name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build OpenNext for Cloudflare
        run: npm run build:cf
        env:
          # Baked into the client bundle at build time; empty = same-origin /api.
          NEXT_PUBLIC_API_BASE: ""

      - name: Verify Cloudflare secrets shape
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          account="${CLOUDFLARE_ACCOUNT_ID:-}"
          token="${CLOUDFLARE_API_TOKEN:-}"
          if [ -z "$account" ] || [ -z "$token" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN secret."
            exit 1
          fi
          # Account IDs are 32 lowercase/uppercase hex chars — not an API token (cfat_...).
          if ! [[ "$account" =~ ^[0-9a-fA-F]{32}$ ]]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID looks invalid (len=${#account}). Expected 32 hex chars from the Cloudflare dashboard sidebar. Do not paste the API token here."
            exit 1
          fi
          if [[ "$token" =~ ^[0-9a-fA-F]{32}$ ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN looks like an Account ID. Secrets may be swapped."
            exit 1
          fi
          echo "Secrets look well-formed (account_id len=${#account}, token len=${#token})."

      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
